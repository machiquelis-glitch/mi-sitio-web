<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhoan 🔥 | El soltero más codiciado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div id="marcador-puntos">💖 Puntos: <span id="puntos">0</span></div>
        <h1>Jhoan 🔥</h1>
        <p>CONOCE AL SOLTERO MÁS CODICIADO 🚀</p>
    </header>

    <main>
        <div id="pantalla-perfil">
            <section class="tarjeta" id="galeria">
                <h2>UN POCO DE ÉL...</h2>
                <div class="foto-placeholder">
                    <div id="locked-placeholder">
                        <span>🔒</span>
                        <p>CONTENIDO VIP</p>
                    </div>
                    <img id="foto-secreta" src="Jhoan.jpg" alt="Foto de Jhoan" style="display: none; width: 100%; height: 100%; object-fit: cover; border-radius: 25px;">
                </div>
                <button id="btn-revelar" onclick="mostrarFoto()">¡Revelar foto! 🙊</button>
            </section>
        </div>

        <div id="pantalla-puzzles" style="display: none;">
            <section class="tarjeta" id="test">
                <h2>PUZZLE NIVEL 1</h2>
                <h3>¿Cuánto sabes de él?</h3>
                <p>¿Cuál es su pasatiempo favorito?</p>
                <button class="btn-opcion" onclick="verificarRespuesta('videojuegos', this)">Jugar Videojuegos</button>
                <button class="btn-opcion" onclick="verificarRespuesta('leer', this)">Leer Poesía</button>
                <button class="btn-opcion" onclick="verificarRespuesta('gym', this)">Ir al Gym</button>
                <p id="resultado-test" class="mensaje-resultado"></p>
            </section>

            <section class="tarjeta" id="puzzle-texto">
                <h2>PUZZLE NIVEL 2</h2>
                <h3>La contraseña secreta</h3>
                <p>¿Cuál es la película favorita de Jhoan?</p>
                <input type="text" id="input-palabra" placeholder="Escribe aquí...">
                <button id="btn-comprobar" onclick="verificarPalabra()">Comprobar</button>
                <p id="resultado-palabra" class="mensaje-resultado"></p>
            </section>
        </div>
    </main>

    <footer>
        <a href="#" class="nav-item active" id="btn-nav-perfil" onclick="cambiarPantalla('perfil')">
            <span>👤</span>
            <p>PERFIL</p>
        </a>
        <a href="#" class="nav-item" id="btn-nav-puzzles" onclick="cambiarPantalla('puzzles')">
            <span>🧩</span>
            <p>PUZZLES</p>
        </a>
        <a href="#" class="nav-item">
            <span>💬</span>
            <p>CHAT</p>
        </a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
